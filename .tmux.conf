unbind r
bind r source-file ~/.tmux.conf

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g prefix C-s

set -g mouse on

set-window-option -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Border colors (theme may override)
set -g pane-border-style bg=default
set -g pane-active-border-style bg=default

# Enable image preview (Yazi)
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# For vertical split
bind '"' split-window -c "#{pane_current_path}"
# For horizontal split
bind % split-window -h -c "#{pane_current_path}"

# Always-on plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Theme-specific plugins (must be declared before TPM runs)
# source-file ~/.config/tmux/themes/catppuccin/plugins.conf
source-file ~/.config/tmux/themes/vague/plugins.conf

# Bootstrap tpm
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Theme visuals (after TPM, so plugin color vars like #{@thm_bg} are available)
# source-file ~/.config/tmux/themes/catppuccin/style.conf
source-file ~/.config/tmux/themes/vague/style.conf
